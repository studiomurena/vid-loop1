<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - ASCII Murena Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: 'VT323', monospace;
        }

        /* Effetto Tubo Catodico */
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 900; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 4px 100%;
        }

        #crt-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 901; pointer-events: none;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="crt-vignette"></div>
    <canvas id="visualizer"></canvas>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // --- CARICAMENTO DEL VOSTRO LOGO ---
        const logoImg = new Image();
        logoImg.src = 'assets/logo-murenanet.png'; // Assicurati che il nome sia esatto!

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- VARIABILI GLOBALI ---
        const charSet = 'STUDIOMURENA01010101ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
        let tempo = 0;

        // --- LA MURENA ---
        const lunghezzaMurena = 140; // Leggermente allungata per farla sembrare più bestiale
        let corpoMurena = []; 
        let particelleCodice = [];

        // Inizializza fuori schermo
        for(let i=0; i<lunghezzaMurena; i++) {
            corpoMurena.push({ x: -2000, y: -2000, char: getRandomChar() });
        }

        function getRandomChar() {
            return charSet.charAt(Math.floor(Math.random() * charSet.length));
        }

        function drawLogo() {
            if (!logoImg.complete || logoImg.naturalWidth === 0) return; // Aspetta che l'immagine sia caricata

            // 1. Calcolo del ridimensionamento (Lascia 20% di spazio ai lati, quindi usa l'80% della larghezza)
            let maxWidth = canvas.width * 0.8;
            let maxHeight = canvas.height * 0.8;
            
            // Trova la scala corretta per non deformare l'immagine
            let scale = Math.min(maxWidth / logoImg.width, maxHeight / logoImg.height);
            let newWidth = logoImg.width * scale;
            let newHeight = logoImg.height * scale;

            // 2. Centra l'immagine
            let cx = (canvas.width / 2) - (newWidth / 2);
            let cy = (canvas.height / 2) - (newHeight / 2);

            // 3. Disegna il logo "fantasma" in background
            ctx.globalAlpha = 0.15; // Trasparente per non rubare la scena alla Murena
            
            // Effetto Neon/Glow attorno al logo
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#00ff41";
            ctx.drawImage(logoImg, cx, cy, newWidth, newHeight);
            ctx.shadowBlur = 0; // reset
            
            // 4. Glitch occasionale sul logo
            if (Math.random() > 0.95) {
                let glitchX = (Math.random() - 0.5) * 15;
                let glitchY = (Math.random() - 0.5) * 15;
                ctx.globalAlpha = 0.4; // Flash più visibile
                ctx.drawImage(logoImg, cx + glitchX, cy + glitchY, newWidth, newHeight);
            }
            
            ctx.globalAlpha = 1.0; // Reset trasparenza per il resto del codice
        }

        function updateMurena() {
            let t = tempo * 0.015; // Velocità base del tempo
            
            // Movimento asse X: Avanza, ma con un'oscillazione che la fa accelerare e frenare
            let speedX = 6; 
            let avanzamento = (tempo * speedX) + Math.sin(t * 2) * 150; 
            let headX = avanzamento % (canvas.width + 1500) - 800; // Esce e rientra con ampio margine
            
            // Movimento asse Y: ONDA SINUOSA CAOTICA
            // Sommiamo tre onde diverse (Lenta/Grande, Media, Veloce/Piccola) per non renderla mai ripetitiva
            let ondaGrande = Math.sin(t * 0.7) * (canvas.height * 0.3);
            let ondaMedia = Math.cos(t * 1.23) * (canvas.height * 0.15); // Il "1.23" rompe la simmetria
            let ondaPiccola = Math.sin(t * 2.5) * 60; // Il tremolio da serpente
            
            let headY = (canvas.height / 2) + ondaGrande + ondaMedia + ondaPiccola;

            // Inserisci la nuova posizione della testa
            corpoMurena.unshift({ 
                x: headX, 
                y: headY, 
                char: (Math.random() > 0.85) ? getRandomChar() : corpoMurena[0].char 
            });
            
            // Mantieni la lunghezza fissa
            if (corpoMurena.length > lunghezzaMurena) corpoMurena.pop();

            // --- VOMITO DI CODICE ---
            if (Math.random() > 0.3) { // 70% di probabilità
                particelleCodice.push({
                    x: headX + (Math.random() * 50 - 25),
                    y: headY + (Math.random() * 50 - 25),
                    velocita: Math.random() * 6 + 3,
                    char: getRandomChar(),
                    opacita: 1,
                    dimensione: Math.random() * 25 + 10
                });
            }
        }

        function drawMurenaAndRain() {
            // Disegna il "Vomito Matrix"
            for (let i = particelleCodice.length - 1; i >= 0; i--) {
                let p = particelleCodice[i];
                p.y += p.velocita; 
                p.opacita -= 0.015; 
                
                if (Math.random() > 0.85) p.char = getRandomChar(); 

                ctx.fillStyle = `rgba(0, 255, 65, ${p.opacita})`;
                ctx.font = `${p.dimensione}px monospace`;
                ctx.fillText(p.char, p.x, p.y);

                if (p.opacita <= 0) particelleCodice.splice(i, 1);
            }

            // Disegna il Corpo della Murena
            for (let i = 0; i < corpoMurena.length; i++) {
                let segmento = corpoMurena[i];
                
                // Effetto prospettiva: La testa è grande, la coda si assottiglia
                let dimensione = 60 - (i * 0.35); 
                
                let verde = 255 - (i * 1.5); 
                let opacita = 1 - Math.pow(i / lunghezzaMurena, 1.5); // Svanisce più dolcemente
                
                if (i === 0) { // LA TESTA
                    ctx.fillStyle = `rgba(255, 255, 255, 1)`; 
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = "#00ff41";
                } else { // IL CORPO
                    ctx.fillStyle = `rgba(0, ${Math.max(40, verde)}, 0, ${opacita})`;
                    ctx.shadowBlur = 0; 
                }

                ctx.font = `bold ${dimensione}px monospace`;
                ctx.fillText(segmento.char, segmento.x, segmento.y);
            }
            ctx.shadowBlur = 0; // Reset
        }

        function animazione() {
            // Sfondo nero con scia (trail)
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawLogo();
            updateMurena();
            drawMurenaAndRain();

            tempo += 1;
            requestAnimationFrame(animazione);
        }

        // Se l'immagine è già in cache parte subito, altrimenti aspetta che carichi
        logoImg.onload = () => {
            console.log("Logo caricato con successo!");
        };
        
        // Fai partire il delirio
        animazione();

    </script>
</body>
</html>
