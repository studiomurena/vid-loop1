<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - ASCII Murena Visualizer Final</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: 'VT323', monospace;
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 900; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 4px 100%;
        }

        #crt-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 901; pointer-events: none;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
        }

        canvas {
            display: block; width: 100%; height: 100%; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="crt-vignette"></div>
    <canvas id="visualizer"></canvas>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // --- CARICAMENTO E COLORAZIONE DEL LOGO BIANCO ---
        const logoImg = new Image();
        logoImg.src = 'assets/logo-studiomurena.png'; 
        
        const tintedLogo = document.createElement('canvas');
        const tintedCtx = tintedLogo.getContext('2d');

        logoImg.onload = () => {
            tintedLogo.width = logoImg.width;
            tintedLogo.height = logoImg.height;

            tintedCtx.drawImage(logoImg, 0, 0);
            tintedCtx.globalCompositeOperation = 'source-in';
            
            let grad = tintedCtx.createLinearGradient(0, 0, 0, logoImg.height);
            grad.addColorStop(0, '#55ff77'); 
            grad.addColorStop(0.5, '#00ff41'); 
            grad.addColorStop(1, '#006611'); 
            
            tintedCtx.fillStyle = grad;
            tintedCtx.fillRect(0, 0, logoImg.width, logoImg.height);

            console.log("Logo bianco caricato e verniciato di verde!");
        };

        // --- SISTEMA PIOGGIA MATRIX (Blackout) ---
        let matrixColumns = [];
        const matrixFontSize = 35;
        const mCharSet = 'SSTTUUDDIIOOMMUURREENNAA01ｱｲｳ'; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let cols = Math.floor(canvas.width / matrixFontSize) + 1;
            matrixColumns = Array(cols).fill(0).map(() => Math.random() * -50);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- VARIABILI GLOBALI ---
        const charSet = 'STUDIOMURENA01010101ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
        let arrayMurene = []; 
        let logoGlitchFrames = 0; 
        let matrixRainTimer = 0; 

        function getRandomChar() {
            return charSet.charAt(Math.floor(Math.random() * charSet.length));
        }

        // --- LA FABBRICA DELLE MURENE ---
        class MurenaASCII {
            constructor(config) {
                this.corpo = []; 
                this.particelle = [];
                this.lunghezza = 140; 
                this.t = 0;
                
                this.dirX = config.dirX; 
                this.startX = this.dirX === 1 ? -800 : canvas.width + 800;
                this.isBehind = config.isBehind; 
                this.twinSign = config.twinSign; 
                
                this.speedX = config.speedX;
                this.baseY = config.baseY;
                
                this.w1 = config.w1; this.a1 = config.a1; 
                this.w2 = config.w2; this.a2 = config.a2; 
                this.w3 = config.w3; this.a3 = config.a3; 

                for(let i=0; i<this.lunghezza; i++) {
                    this.corpo.push({ x: this.startX, y: this.baseY, char: getRandomChar() });
                }
            }

            update() {
                this.t += 1;
                let headX = this.startX + (this.t * this.speedX * this.dirX);
                let ondaGrande = Math.sin(this.t * this.w1) * this.a1;
                let ondaMedia = Math.cos(this.t * this.w2) * this.a2; 
                let ondaPiccola = Math.sin(this.t * this.w3) * this.a3; 
                
                let waveTotal = (ondaGrande + ondaMedia + ondaPiccola) * this.twinSign;
                let headY = this.baseY + waveTotal;

                this.corpo.unshift({ 
                    x: headX, y: headY, 
                    char: (Math.random() > 0.85) ? getRandomChar() : this.corpo[0].char 
                });
                
                if (this.corpo.length > this.lunghezza) this.corpo.pop();

                if (Math.random() > 0.25) { 
                    this.particelle.push({
                        x: headX + (Math.random() * 60 - 30),
                        y: headY + (Math.random() * 60 - 30),
                        velocita: Math.random() * 8 + 4,
                        char: getRandomChar(), opacita: 1,
                        dimensione: Math.random() * 30 + 15
                    });
                }
            }

            draw() {
                // --- FATTORE PROFONDITÀ --- 
                // Se è "dietro", opacità massima al 25%
                let fadeFactor = this.isBehind ? 0.25 : 1.0; 

                for (let i = this.particelle.length - 1; i >= 0; i--) {
                    let p = this.particelle[i];
                    p.y += p.velocita; p.opacita -= 0.02; 
                    if (Math.random() > 0.85) p.char = getRandomChar(); 

                    ctx.fillStyle = `rgba(0, 204, 50, ${p.opacita * fadeFactor})`;
                    ctx.font = `bold ${p.dimensione}px monospace`;
                    ctx.fillText(p.char, p.x, p.y);
                    if (p.opacita <= 0) this.particelle.splice(i, 1);
                }

                for (let i = 0; i < this.corpo.length; i++) {
                    let segmento = this.corpo[i];
                    let dimensione = 95 - (i * 0.55); 
                    
                    let verde = 204 - (i * 1.5); 
                    
                    // Applichiamo il fadeFactor per rendere le murene sul retro quasi invisibili
                    let opacita = (0.85 - Math.pow(i / this.lunghezza, 1.5) * 0.85) * fadeFactor; 
                    
                    let glitchX = 0;
                    let isGlitching = false;

                    if (i === 0) { 
                        // Testa della Murena
                        ctx.fillStyle = `rgba(180, 255, 180, ${0.9 * fadeFactor})`; 
                        ctx.shadowBlur = this.isBehind ? 5 : 20; // Riduciamo l'alone se è lontana
                        ctx.shadowColor = `rgba(0, 255, 65, ${0.8 * fadeFactor})`;
                    } else { 
                        // Corpo della Murena
                        ctx.fillStyle = `rgba(0, ${Math.max(30, verde)}, 0, ${opacita})`;
                        ctx.shadowBlur = 0; 
                        
                        // Glitch minimale rosso/blu
                        if (Math.random() > 0.992) { 
                            glitchX = (Math.random() - 0.5) * 18;
                            ctx.fillStyle = Math.random() > 0.5 ? `rgba(255, 0, 0, ${opacita})` : `rgba(0, 0, 255, ${opacita})`;
                            isGlitching = true;
                        }
                    }

                    ctx.font = `bold ${dimensione}px monospace`;
                    
                    if (isGlitching) {
                        ctx.fillText(segmento.char, segmento.x + glitchX, segmento.y);
                    } else {
                        ctx.fillText(segmento.char, segmento.x, segmento.y);
                    }
                }
                ctx.shadowBlur = 0; 
            }

            isDead() {
                let coda = this.corpo[this.corpo.length - 1];
                return (this.dirX === 1 && coda.x > canvas.width + 300) || (this.dirX === -1 && coda.x < -300);
            }
        }

        function spawnMurene() {
            let config = {
                dirX: Math.random() > 0.5 ? 1 : -1,
                isBehind: Math.random() < 0.70, 
                baseY: (canvas.height / 2) + (Math.random() * 600 - 300), 
                speedX: Math.random() * 6 + 5, 
                w1: Math.random() * 0.015 + 0.005, a1: Math.random() * (canvas.height * 0.35) + 50,
                w2: Math.random() * 0.025 + 0.015, a2: Math.random() * (canvas.height * 0.20) + 50,
                w3: Math.random() * 0.05 + 0.030, a3: Math.random() * 80 + 30
            };

            arrayMurene.push(new MurenaASCII({ ...config, twinSign: 1 }));
            if (Math.random() > 0.85) arrayMurene.push(new MurenaASCII({ ...config, twinSign: -1 }));
        }

        function drawLogo() {
            if (tintedLogo.width === 0) return; 

            let maxWidth = canvas.width * 0.8; let maxHeight = canvas.height * 0.8;
            let scale = Math.min(maxWidth / tintedLogo.width, maxHeight / tintedLogo.height);
            let newWidth = tintedLogo.width * scale; let newHeight = tintedLogo.height * scale;
            let cx = (canvas.width / 2) - (newWidth / 2); let cy = (canvas.height / 2) - (newHeight / 2);

            // --- GLITCH RESO MOLTO PIÙ RARO (> 0.999 invece di 0.995) ---
            if (Math.random() > 0.999 && logoGlitchFrames === 0) logoGlitchFrames = Math.floor(Math.random() * 20 + 15); 

            if (logoGlitchFrames > 0) {
                logoGlitchFrames--;
                let slices = 8;
                let sliceHeightOrig = tintedLogo.height / slices;
                let sliceHeightDest = newHeight / slices;

                for (let i = 0; i < slices; i++) {
                    let intensita = (logoGlitchFrames / 35) * 150; 
                    let shiftX = (Math.random() - 0.5) * intensita;
                    ctx.globalAlpha = 0.5; 
                    
                    ctx.shadowColor = "red"; ctx.shadowBlur = 10;
                    ctx.drawImage(tintedLogo, 0, i * sliceHeightOrig, tintedLogo.width, sliceHeightOrig, cx + shiftX - 15, cy + (i * sliceHeightDest), newWidth, sliceHeightDest);
                    
                    ctx.shadowColor = "#00ff41"; ctx.shadowBlur = 10;
                    ctx.drawImage(tintedLogo, 0, i * sliceHeightOrig, tintedLogo.width, sliceHeightOrig, cx + shiftX + 15, cy + (i * sliceHeightDest), newWidth, sliceHeightDest);
                }
                ctx.shadowBlur = 0;
            } else {
                ctx.globalAlpha = 0.20; 
                ctx.shadowBlur = 20; ctx.shadowColor = "#00ff41";
                ctx.drawImage(tintedLogo, cx, cy, newWidth, newHeight);
                ctx.shadowBlur = 0; 
                
                // --- MICRO-TREMOLIO RESO PIÙ RARO (> 0.985 invece di 0.96) ---
                if (Math.random() > 0.985) {
                    let glitchX = (Math.random() - 0.5) * 15;
                    ctx.globalAlpha = 0.4; 
                    ctx.drawImage(tintedLogo, cx + glitchX, cy, newWidth, newHeight);
                }
            }
            ctx.globalAlpha = 1.0; 
        }

        function drawMatrixRain() {
            ctx.font = `bold ${matrixFontSize}px monospace`;
            
            matrixColumns.forEach((y, i) => {
                let char = mCharSet.charAt(Math.floor(Math.random() * mCharSet.length));
                
                if (Math.random() > 0.95) {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff41';
                } else {
                    ctx.fillStyle = 'rgba(0, 204, 50, 0.85)';
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillText(char, i * matrixFontSize, y * matrixFontSize);
                
                if (y * matrixFontSize > canvas.height && Math.random() > 0.85) {
                    matrixColumns[i] = 0;
                }
                matrixColumns[i] += 0.8; 
            });
            ctx.shadowBlur = 0;
        }

        function animazione() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            arrayMurene = arrayMurene.filter(m => !m.isDead());
            if (arrayMurene.length === 0 || (arrayMurene.length < 3 && Math.random() > 0.99)) spawnMurene();
            arrayMurene.forEach(m => m.update());

            let isMatrixActive = matrixRainTimer > 0;
            
            if (isMatrixActive) {
                matrixRainTimer--;
                drawMatrixRain(); 
            } else {
                if (Math.random() > 0.9993) {
                    matrixRainTimer = Math.floor(Math.random() * 120 + 180);
                    matrixColumns = matrixColumns.map(() => Math.random() * -30);
                }
            }

            // --- RENDER FINALE Z-INDEX ---
            arrayMurene.filter(m => m.isBehind).forEach(m => m.draw());
            
            if (!isMatrixActive) {
                drawLogo(); 
            }
            
            arrayMurene.filter(m => !m.isBehind).forEach(m => m.draw());

            requestAnimationFrame(animazione);
        }

        animazione();

    </script>
</body>
</html>
