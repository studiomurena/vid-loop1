<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - ASCII Murena Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: 'VT323', monospace;
        }

        /* Effetto Tubo Catodico */
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 900; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 4px 100%;
        }

        #crt-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 901; pointer-events: none;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="crt-vignette"></div>
    <canvas id="visualizer"></canvas>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // --- CARICAMENTO DEL LOGO ---
        const logoImg = new Image();
        logoImg.src = 'assets/logo-murenanet.png'; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- VARIABILI GLOBALI ---
        const charSet = 'STUDIOMURENA01010101ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
        let arrayMurene = []; 
        let logoGlitchFrames = 0; // Timer per la scomposizione del logo

        function getRandomChar() {
            return charSet.charAt(Math.floor(Math.random() * charSet.length));
        }

        // --- LA FABBRICA DELLE MURENE ---
        class MurenaASCII {
            constructor(config) {
                this.corpo = []; 
                this.particelle = [];
                this.lunghezza = 140; 
                this.t = 0;
                
                this.dirX = config.dirX; 
                this.startX = this.dirX === 1 ? -800 : canvas.width + 800;
                this.isBehind = config.isBehind; 
                this.twinSign = config.twinSign; 
                
                this.speedX = config.speedX;
                this.baseY = config.baseY;
                
                this.w1 = config.w1; this.a1 = config.a1; 
                this.w2 = config.w2; this.a2 = config.a2; 
                this.w3 = config.w3; this.a3 = config.a3; 

                for(let i=0; i<this.lunghezza; i++) {
                    this.corpo.push({ x: this.startX, y: this.baseY, char: getRandomChar() });
                }
            }

            update() {
                this.t += 1;
                
                let headX = this.startX + (this.t * this.speedX * this.dirX);
                
                let ondaGrande = Math.sin(this.t * this.w1) * this.a1;
                let ondaMedia = Math.cos(this.t * this.w2) * this.a2; 
                let ondaPiccola = Math.sin(this.t * this.w3) * this.a3; 
                
                let waveTotal = (ondaGrande + ondaMedia + ondaPiccola) * this.twinSign;
                let headY = this.baseY + waveTotal;

                this.corpo.unshift({ 
                    x: headX, 
                    y: headY, 
                    char: (Math.random() > 0.85) ? getRandomChar() : this.corpo[0].char 
                });
                
                if (this.corpo.length > this.lunghezza) this.corpo.pop();

                // Generazione Vomito Matrix più massiccio
                if (Math.random() > 0.25) { 
                    this.particelle.push({
                        x: headX + (Math.random() * 60 - 30),
                        y: headY + (Math.random() * 60 - 30),
                        velocita: Math.random() * 8 + 4,
                        char: getRandomChar(),
                        opacita: 1,
                        dimensione: Math.random() * 30 + 15
                    });
                }
            }

            draw() {
                for (let i = this.particelle.length - 1; i >= 0; i--) {
                    let p = this.particelle[i];
                    p.y += p.velocita; 
                    p.opacita -= 0.02; 
                    if (Math.random() > 0.85) p.char = getRandomChar(); 

                    ctx.fillStyle = `rgba(0, 255, 65, ${p.opacita})`;
                    ctx.font = `bold ${p.dimensione}px monospace`;
                    ctx.fillText(p.char, p.x, p.y);
                    if (p.opacita <= 0) this.particelle.splice(i, 1);
                }

                for (let i = 0; i < this.corpo.length; i++) {
                    let segmento = this.corpo[i];
                    
                    // --- MURENE PIÙ CICCIOTTE ---
                    // Partono da 95px (enormi) e decrescono più dolcemente
                    let dimensione = 95 - (i * 0.55); 
                    
                    let verde = 255 - (i * 1.5); 
                    let opacita = 1 - Math.pow(i / this.lunghezza, 1.5); 
                    
                    if (i === 0) { 
                        ctx.fillStyle = `rgba(255, 255, 255, 1)`; 
                        ctx.shadowBlur = 35;
                        ctx.shadowColor = "#00ff41";
                    } else { 
                        ctx.fillStyle = `rgba(0, ${Math.max(40, verde)}, 0, ${opacita})`;
                        ctx.shadowBlur = 0; 
                    }

                    // Font in grassetto per renderle ancora più solide
                    ctx.font = `bold ${dimensione}px monospace`;
                    ctx.fillText(segmento.char, segmento.x, segmento.y);
                }
                ctx.shadowBlur = 0; 
            }

            isDead() {
                let coda = this.corpo[this.corpo.length - 1];
                if (this.dirX === 1 && coda.x > canvas.width + 300) return true;
                if (this.dirX === -1 && coda.x < -300) return true;
                return false;
            }
        }

        function spawnMurene() {
            let dirX = Math.random() > 0.5 ? 1 : -1;
            let isBehind = Math.random() < 0.70; 
            let isTwin = Math.random() > 0.85;   

            let config = {
                dirX: dirX,
                isBehind: isBehind,
                baseY: (canvas.height / 2) + (Math.random() * 600 - 300), 
                speedX: Math.random() * 6 + 5, 
                w1: Math.random() * 0.015 + 0.005, a1: Math.random() * (canvas.height * 0.35) + 50,
                w2: Math.random() * 0.025 + 0.015, a2: Math.random() * (canvas.height * 0.20) + 50,
                w3: Math.random() * 0.05 + 0.030, a3: Math.random() * 80 + 30
            };

            arrayMurene.push(new MurenaASCII({ ...config, twinSign: 1 }));
            if (isTwin) arrayMurene.push(new MurenaASCII({ ...config, twinSign: -1 }));
        }

        function drawLogo() {
            if (!logoImg.complete || logoImg.naturalWidth === 0) return; 

            let maxWidth = canvas.width * 0.8;
            let maxHeight = canvas.height * 0.8;
            let scale = Math.min(maxWidth / logoImg.width, maxHeight / logoImg.height);
            let newWidth = logoImg.width * scale;
            let newHeight = logoImg.height * scale;

            let cx = (canvas.width / 2) - (newWidth / 2);
            let cy = (canvas.height / 2) - (newHeight / 2);

            // 1. Innesca il mega glitch raramente (Scomposizione)
            if (Math.random() > 0.995 && logoGlitchFrames === 0) {
                // Il glitch dura tra i 15 e i 35 frame
                logoGlitchFrames = Math.floor(Math.random() * 20 + 15); 
            }

            if (logoGlitchFrames > 0) {
                // --- FASE DI SCOMPOSIZIONE E RICOSTRUZIONE ---
                logoGlitchFrames--;
                
                // Dividiamo l'immagine in 8 fette orizzontali
                let slices = 8;
                let sliceHeightOrig = logoImg.height / slices;
                let sliceHeightDest = newHeight / slices;

                for (let i = 0; i < slices; i++) {
                    // L'intensità dello spostamento diminuisce man mano che il tempo scade (ricostruendosi)
                    let intensita = (logoGlitchFrames / 35) * 150; 
                    let shiftX = (Math.random() - 0.5) * intensita;
                    
                    ctx.globalAlpha = 0.5; // Leggermente più luminoso durante il glitch
                    
                    // Fetta ROSSA (Spostata a sinistra)
                    ctx.shadowColor = "red"; ctx.shadowBlur = 10;
                    ctx.drawImage(
                        logoImg, 
                        0, i * sliceHeightOrig, logoImg.width, sliceHeightOrig, 
                        cx + shiftX - 15, cy + (i * sliceHeightDest), newWidth, sliceHeightDest
                    );
                    
                    // Fetta VERDE ACIDO (Spostata a destra)
                    ctx.shadowColor = "#00ff41"; ctx.shadowBlur = 10;
                    ctx.drawImage(
                        logoImg, 
                        0, i * sliceHeightOrig, logoImg.width, sliceHeightOrig, 
                        cx + shiftX + 15, cy + (i * sliceHeightDest), newWidth, sliceHeightDest
                    );
                }
                ctx.shadowBlur = 0;

            } else {
                // --- FASE NORMALE (Bassa opacità elegante) ---
                ctx.globalAlpha = 0.20; 
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#00ff41";
                ctx.drawImage(logoImg, cx, cy, newWidth, newHeight);
                ctx.shadowBlur = 0; 
                
                // Micro-glitch leggero e continuo (tremolio)
                if (Math.random() > 0.96) {
                    let glitchX = (Math.random() - 0.5) * 15;
                    ctx.globalAlpha = 0.4; 
                    ctx.drawImage(logoImg, cx + glitchX, cy, newWidth, newHeight);
                }
            }
            
            ctx.globalAlpha = 1.0; // Reset trasparenza
        }

        function animazione() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            arrayMurene = arrayMurene.filter(m => !m.isDead());

            if (arrayMurene.length === 0 || (arrayMurene.length < 3 && Math.random() > 0.99)) {
                spawnMurene();
            }

            arrayMurene.forEach(m => m.update());

            // Z-INDEX: Dietro, Logo, Davanti
            arrayMurene.filter(m => m.isBehind).forEach(m => m.draw());
            drawLogo();
            arrayMurene.filter(m => !m.isBehind).forEach(m => m.draw());

            requestAnimationFrame(animazione);
        }

        logoImg.onload = () => console.log("Logo caricato, distruzione in corso...");
        animazione();

    </script>
</body>
</html>
